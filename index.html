<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Oréal | Smart Routine &amp; Product Advisor</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
 <body>
    <div class="page-wrapper">
      <!------- Header / Branding ------->
  <header class="site-header">
    <div class="header-content">
        <div class="logo-container">
            <img src="https://upload.wikimedia.org/wikipedia/commons/9/9d/L%27Or%C3%A9al_logo.svg" alt="L'Oréal Paris Logo" class="brand-logo" />
            <div class="gold-line"></div>
        </div>
        <p class="sub-title">SMART PRODUCT ADVISOR</p>
        <button id="historyBtn" class="btn-history">
            <span>HISTORY</span>
        </button>
    </div>
    <div id="historyModal" class="modal" style="display: none;">
  <div class="modal-content">
    <span class="close" onclick="closeHistory()">&times;</span>
    <h2>Chat History</h2>
    <div id="historyContent"></div>
    <button class="btn-clear-history" onclick="clearHistory()">Clear History</button>
  </div>
</div>
</header>
      <!-- Category Filter -->
       <div class="search-section">
  <div class="search-wrapper">
    <i class="fa-solid fa-magnifying-glass search-icon"></i>
    <input type="text" id="productSearch" placeholder="Search products..." />
  </div>
</div>
      <div class="search-section">
        <select id="categoryFilter">
          <option value="" disabled selected>Choose a Category</option>
          <option value="cleanser">Cleansers</option>
          <option value="moisturizer">Moisturizers & Treatments</option>
          <option value="haircare">Haircare</option>
          <option value="makeup">Makeup</option>
          <option value="hair color">Hair Color</option>
          <option value="hair styling">Hair Styling</option>
          <option value="men's grooming">Men's Grooming</option>
          <option value="suncare">Suncare</option>
          <option value="fragrance">Fragrance</option>
        </select>
      </div>
      
      <!-- Products Grid -->
      <div id="productsContainer" class="products-grid"></div>

      <!-- Selected Products -->
       <div class="selected-products">
  <div class="selection-header">
    <h2>Selected Products</h2>
    <button id="clearAllBtn" class="btn-clear-selection">Clear All</button>
  </div>
  <div id="selectedProductsList"></div>
        <button id="generateRoutine" class="generate-btn">
          <i class="fa-solid fa-wand-magic-sparkles"></i> Generate Routine
        </button>
        
      </div>

      <!------- Chat Area ------->
      <section class="chatbox">
        <h2>Let's Build Your Routine</h2>
        <div id="chatWindow" class="chat-window"></div>

        <form id="chatForm" class="chat-form">
          <label for="userInput" class="visually-hidden">Message</label>
          <input
            id="userInput"
            name="userInput"
            type="text"
            placeholder="Ask me about products or routines…"
            autocomplete="off"
            required
          />
          <button type="submit" id="sendBtn">
            <i class="fa-solid fa-paper-plane"></i>
            <span class="visually-hidden">Send</span>
          </button>
        </form>
      </section>

      <!------- Footer Links ------->
      <footer class="site-footer">
        <p>&copy; 2025 L'Oréal. All rights reserved.</p>
        <nav>
          <!-- These URLs are placeholders -->
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Use</a>
          <a href="#">Contact</a>
        </nav>
      </footer>
    </div>

    <!-- Product Details Modal -->
    <div id="productModal" class="product-modal">
      <div class="product-modal-content">
        <button class="close-modal-btn" onclick="closeProductModal()">×</button>
        <div class="product-modal-header">
          <img id="modalProductImage" src="about:blank" alt="" class="product-modal-image" loading="lazy">
          <div class="product-modal-title">
            <h2 id="modalProductName"></h2>
            <p id="modalProductBrand"></p>
          </div>
        </div>
        <div id="modalProductDescription" class="product-modal-description"></div>
        <div class="product-modal-actions">
          <button class="select-from-modal-btn">Add to Selection</button>
          <button class="select-from-modal-btn" onclick="closeProductModal()" style="background: #999;">Close</button>
        </div>
      </div>
    </div>

    <!-- secrets.js can be removed when using Cloudflare Workers for API requests -->
    <script src="secrets.js"></script>
    <script src="script.js"></script>
  </body>
</html>
